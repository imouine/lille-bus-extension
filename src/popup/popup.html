<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lille Bus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <section aria-label="Choix de l'arrêt">
        <label for="stopSearch" data-i18n="label_stop">Arrêt</label>
        <input
          id="stopSearch"
          type="text"
          placeholder="Tape le nom de l’arrêt"
          data-i18n-placeholder="placeholder_stop"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="stopHint" class="hint"></div>
        <ul id="stopResults" class="list" role="listbox" aria-label="Suggestions d’arrêts"></ul>
      </section>

      <section id="lineSection" class="hidden" aria-label="Choix de la ligne">
        <div class="sectionTitle" data-i18n="title_line">Ligne</div>
        <ul id="lineResults" class="list"></ul>
      </section>

      <section id="directionSection" class="hidden" aria-label="Choix du sens">
        <div class="sectionTitle" data-i18n="title_direction">Sens</div>
        <ul id="directionResults" class="list"></ul>
      </section>

      <section id="validateSection" class="hidden" aria-label="Validation">
        <div id="summary" class="summary"></div>
        <button id="validateBtn" type="button" data-i18n="btn_validate">Valider</button>
      </section>

      <section aria-label="Préférences">
        <div class="sectionTitle" data-i18n="title_preferences">Préférences</div>

        <label class="toggleRow">
          <span class="toggleText" data-i18n="toggle_theme">Mode nuit</span>
          <input id="themeToggle" class="toggleInput" type="checkbox" />
          <span class="toggleSwitch" aria-hidden="true"></span>
        </label>

        <label class="toggleRow">
          <span class="toggleText" data-i18n="toggle_lang">English</span>
          <input id="langToggle" class="toggleInput" type="checkbox" />
          <span class="toggleSwitch" aria-hidden="true"></span>
        </label>
      </section>

      <div id="status" class="status" role="status" aria-live="polite"></div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
