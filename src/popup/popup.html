<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lille Bus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <section aria-label="Choix de l'arrêt">
        <label for="stopSearch" data-i18n="label_stop">Arrêt</label>
        <input
          id="stopSearch"
          type="text"
          placeholder="Tape le nom de l’arrêt"
          data-i18n-placeholder="placeholder_stop"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="stopHint" class="hint"></div>
        <ul id="stopResults" class="list" role="listbox" aria-label="Suggestions d’arrêts"></ul>
      </section>

      <section id="lineSection" class="hidden" aria-label="Choix de la ligne">
        <div class="sectionTitle" data-i18n="title_line">Ligne</div>
        <ul id="lineResults" class="list"></ul>
      </section>

      <section id="directionSection" class="hidden" aria-label="Choix du sens">
        <div class="sectionTitle" data-i18n="title_direction">Sens</div>
        <ul id="directionResults" class="list"></ul>
      </section>

      <section id="validateSection" class="hidden" aria-label="Validation">
        <div id="summary" class="summary"></div>
        <div class="validateRow">
          <button id="addWatcherBtn" type="button" data-i18n="btn_add">+ Ajouter</button>
          <button id="validateBtn"   type="button" data-i18n="btn_validate">Valider</button>
        </div>
      </section>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <!-- Liste des combinaisons surveillées -->
      <section id="watchersSection" class="hidden" aria-label="Combinaisons surveillées">
        <div class="watchersHeader">
          <span class="sectionTitle" data-i18n="label_watchers">Surveillés</span>
          <button id="clearWatchersBtn" class="clearWatchersBtn" type="button" data-i18n="btn_clear_all">Tout supprimer</button>
        </div>
        <ul id="watchersList" class="watchersList"></ul>
      </section>

      <div class="settingsRow">
        <button id="pauseBtn" class="settingsBtn pauseBtn" type="button" aria-label="Pause refresh" aria-pressed="false">
          <!-- icône pause (affichée quand actif) -->
          <svg class="icon-pause" width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <rect x="4"  y="3" width="4" height="14" rx="1.5" fill="currentColor"/>
            <rect x="12" y="3" width="4" height="14" rx="1.5" fill="currentColor"/>
          </svg>
          <!-- icône play (affichée quand en pause) -->
          <svg class="icon-play" width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 3.5 L16 10 L5 16.5 Z" fill="currentColor"/>
          </svg>
          <span id="pauseBtnLabel" data-i18n="btn_pause">Pause</span>
        </button>

        <button id="openOptionsBtn" class="settingsBtn" type="button">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/>
            <path d="M10 1.5v2M10 16.5v2M18.5 10h-2M3.5 10h-2M15.95 4.05l-1.41 1.41M5.46 14.54l-1.41 1.41M15.95 15.95l-1.41-1.41M5.46 5.46L4.05 4.05" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="1.6" stroke-dasharray="2.8 1.95"/>
          </svg>
          <span data-i18n="btn_settings">Préférences</span>
        </button>
      </div>

      <div class="supportRow">
        <a href="https://ko-fi.com/imouine" target="_blank" rel="noopener" class="supportLink" data-i18n="link_support">❤️ Support</a>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
